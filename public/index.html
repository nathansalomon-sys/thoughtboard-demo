<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thoughtboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/app.css" />
</head>
<body>

  <!-- ─── Header ─────────────────────────────────────────────────── -->
  <header id="header">
    <div class="brand">
      <div class="brand-mark">
        <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
          <rect width="28" height="28" rx="7" fill="#F48120"/>
          <path d="M6 19 L10 13 L14 16 L18 9 L22 12" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
          <circle cx="22" cy="12" r="2" fill="white"/>
        </svg>
      </div>
      <div>
        <div class="brand-name">Thoughtboard</div>
        <div class="brand-tagline">Feedback Intelligence</div>
      </div>
    </div>
    <div class="header-controls">
      <div class="header-control-group">
        <label class="header-label" for="product-select">Product</label>
        <select id="product-select" class="header-select">
          <option value="all">All Products</option>
        </select>
      </div>
      <div class="header-divider"></div>
      <div class="header-control-group">
        <label class="header-label" for="time-select">Time Range</label>
        <select id="time-select" class="header-select">
          <option value="all" selected>All Time</option>
          <option value="7d">Last 7 days</option>
          <option value="30d">Last 30 days</option>
          <option value="90d">Last 90 days</option>
          <option value="1y">Last year</option>
        </select>
      </div>
    </div>
  </header>

  <main>

    <!-- ─── Row 0: Stats ──────────────────────────────────────────── -->
    <section id="stats">
      <div class="stat-card" id="stat-total">
        <div class="stat-label">Total Feedback</div>
        <div class="stat-value skeleton">—</div>
      </div>
      <div class="stat-card" id="stat-change">
        <div class="stat-label">vs. Prior Period</div>
        <div class="stat-value skeleton">—</div>
      </div>
      <div class="stat-card" id="stat-themes">
        <div class="stat-label">Active Themes</div>
        <div class="stat-value skeleton">—</div>
      </div>
    </section>

    <!-- ─── Row 1: Sentiment ──────────────────────────────────────── -->
    <section id="row1">

      <div class="card" id="gauge-card">
        <div class="card-header">
          <span class="card-title">Overall Sentiment</span>
          <span class="tip tip-icon" data-tip="Average sentiment score across all matching feedback, rated from −1.0 (very negative) to +1.0 (very positive) by AI analysis.">i</span>
        </div>
        <div id="gauge-container">
          <svg id="gauge-svg" viewBox="0 0 200 110" xmlns="http://www.w3.org/2000/svg">
            <path id="gauge-track" d="" fill="none" stroke="#e8edf3" stroke-width="18" stroke-linecap="round"/>
            <path id="gauge-red"   d="" fill="none" stroke="#ef4444" stroke-width="14" stroke-linecap="round"/>
            <path id="gauge-amber" d="" fill="none" stroke="#f59e0b" stroke-width="14" stroke-linecap="round"/>
            <path id="gauge-green" d="" fill="none" stroke="#22c55e" stroke-width="14" stroke-linecap="round"/>
            <g id="gauge-needle-group" style="transform-origin:100px 100px;transform:rotate(0deg);transition:transform 0.9s cubic-bezier(.34,1.56,.64,1)">
              <line x1="100" y1="100" x2="100" y2="40" stroke="#1e293b" stroke-width="2.5" stroke-linecap="round"/>
              <circle cx="100" cy="100" r="6" fill="#1e293b"/>
              <circle cx="100" cy="100" r="3" fill="white"/>
            </g>
          </svg>
          <div id="gauge-label">
            <span id="gauge-score-num" class="gauge-score-num">—</span>
            <span id="gauge-sent-label" class="gauge-sent-label">—</span>
          </div>
        </div>
      </div>

      <div class="card" id="trend-card">
        <div class="card-header">
          <span class="card-title">Sentiment Trend</span>
          <span class="tip tip-icon" data-tip="Daily average sentiment score over time. Reveals whether customer mood is improving or declining and when key shifts occurred.">i</span>
        </div>
        <div class="chart-wrap">
          <canvas id="trend-chart"></canvas>
        </div>
      </div>

    </section>

    <!-- ─── Row 2: Volume + Themes ───────────────────────────────── -->
    <section id="row2">
      <div class="card" id="row2-card">
        <div id="source-filter-bar">
          <span class="filter-label">Filter by Source</span>
          <div id="source-checkboxes"></div>
        </div>
        <div class="row2-panels">
          <div id="volume-panel">
            <div class="card-title">Feedback Volume</div>
            <div class="chart-wrap">
              <canvas id="volume-chart"></canvas>
            </div>
          </div>
          <div id="themes-panel">
            <div class="card-title">Top Themes</div>
            <div id="themes-list"></div>
          </div>
        </div>
      </div>
    </section>

    <!-- ─── Row 3: Quote-board ────────────────────────────────────── -->
    <section id="row3">
      <div class="card" id="quotes-card">

        <div id="quotes-empty-state">
          <div class="empty-icon">💬</div>
          <div class="empty-text">Click a theme above to explore individual quotes</div>
        </div>

        <div id="quotes-board" class="hidden">
          <div class="quotes-header">
            <div class="quotes-title-row">
              <span class="card-title" style="margin-bottom:0">Quotes for:</span>
              <span id="quotes-theme-label" class="theme-label-tag"></span>
            </div>
            <button id="quotes-clear-btn" class="btn-icon" title="Clear selection">✕</button>
          </div>

          <div class="quotes-filter-bar">
            <div class="qfilter-group">
              <span class="qfilter-label">Source</span>
              <div id="quote-source-checkboxes" class="inline-checks"></div>
            </div>
            <div class="qfilter-group">
              <label class="qfilter-label" for="quote-sentiment-select">Sentiment</label>
              <select id="quote-sentiment-select" class="filter-select">
                <option value="">All</option>
                <option value="positive">Positive</option>
                <option value="negative">Negative</option>
                <option value="neutral">Neutral</option>
              </select>
            </div>
            <div class="qfilter-group">
              <label class="qfilter-label" for="quote-urgency-select">Urgency</label>
              <select id="quote-urgency-select" class="filter-select">
                <option value="">All</option>
                <option value="critical">Critical</option>
                <option value="high">High</option>
                <option value="medium">Medium</option>
                <option value="low">Low</option>
              </select>
            </div>
          </div>

          <div id="quotes-list"></div>
          <div id="quotes-load-more-wrap" class="hidden">
            <button id="quotes-load-more" class="btn-secondary">Load more</button>
          </div>
        </div>

      </div>
    </section>

    <!-- ─── Deep Dive ─────────────────────────────────────────────── -->
    <section id="deepdive">
      <div class="card" id="deepdive-card">
        <div class="card-header" style="margin-bottom:12px">
          <span class="card-title">Deep Dive</span>
          <span class="deepdive-hint">Powered by Workers AI · Ctrl+Enter to submit</span>
        </div>
        <div class="deepdive-input-row">
          <textarea id="deepdive-query" placeholder="Ask a question about this data… e.g. What are D1's biggest pain points?" rows="2"></textarea>
          <button id="deepdive-btn" class="btn-primary">Ask →</button>
        </div>
        <div id="deepdive-response" class="hidden"></div>
      </div>
    </section>

  </main>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
  <script src="/app.js"></script>
</body>
</html>
